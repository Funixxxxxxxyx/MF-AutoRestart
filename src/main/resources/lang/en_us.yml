schedule_add_invalid_time: "<prefix> <red>Invalid time format. Use <yellow>HH:mm</yellow> (e.g., 04:00)."
schedule_add_invalid_day: "<prefix> <red>Invalid day. Use full day name (e.g., <yellow>SUNDAY</yellow>, <yellow>MONDAY</yellow>)."
schedule_add_missing_day: "<prefix> <red>Weekly schedules require a day argument. Usage: <yellow>/ar schedule add weekly <day> <HH:mm></yellow>"
schedule_list_header: "<dark_gray>--- <yellow>Scheduled Restarts</yellow> <dark_gray>---"
