status_schedules_header: "<gray>Loaded Schedules:"
status_schedule_entry: "  <dark_gray>» <yellow><type></yellow>: <white><value>"

# ------------------------------------
# Schedule Commands
# ------------------------------------
schedule_add_success: "<prefix> <green>Dynamic schedule added: <yellow><type></yellow> at <yellow><time></yellow>."
